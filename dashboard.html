<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuji - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background: #f4f7f6;
            font-family: 'Kanit', sans-serif;
        }

        .top-bar {
            background: #2d5a27;
            color: white;
            padding: 20px;
            border-radius: 0 0 25px 25px;
        }

        .menu-btn {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            text-decoration: none;
            color: #333;
            display: block;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>

<body>
    <div class="top-bar shadow">
        <h3>Fuji Mobile Shop</h3>
        <p class="mb-0 opacity-75">จัดการสต็อกและยอดขาย</p>
    </div>
    <div class="container mt-4">
        <div class="row g-3">
            <div class="col-6"><a href="sale.html" class="menu-btn"><i
                        class="bi bi-qr-code-scan fs-1 text-primary"></i><br>คีย์ขายของ</a></div>
            <div class="col-6"><a href="record.html" class="menu-btn"><i
                        class="bi bi-box-seam fs-1 text-success"></i><br>ลงสต็อก</a></div>
            <div class="col-12"><a href="logout.html" class="menu-btn py-3"><i class="bi bi-power text-danger"></i>
                    ออกจากระบบ</a></div>
        </div>
    </div>
    <script>if (!localStorage.getItem("fuji_auth")) window.location.href = "index.html";</script>
</body>

</html>
