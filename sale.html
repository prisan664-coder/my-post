<!DOCTYPE html>
<html lang="lo">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuji Fast POS - ສິນຄ້າລາວ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --fuji-primary: #0d6efd;
            --glass: rgba(255, 255, 255, 0.95);
        }

        body {
            background: #f0f2f5;
            font-family: 'Kanit', sans-serif;
            min-height: 100vh;
            padding-bottom: 150px;
        }

        .header-pos {
            background: #fff;
            border-bottom: 1px solid #ddd;
            padding: 15px 0;
        }

        #reader {
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
        }

        .cart-item {
            background: white;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            border: none;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .footer-total {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-top: 2px solid #eee;
            z-index: 1000;
        }
    </style>
</head>

<body>

    <div class="header-pos mb-3 shadow-sm">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="dashboard.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-house"></i></a>
            <h5 class="fw-bold mb-0">ຂາຍສິນຄ້າ (ປ້ອນລະຫັດ/ສະແກນ)</h5>
            <button class="btn btn-sm btn-danger" onclick="clearCart()">ລ້າງກະຕ່າ</button>
        </div>
    </div>

    <div class="container">
        <div class="card p-3 border-0 shadow-sm mb-3 rounded-4">
            <!-- ส่วนของกล้อง (แบบเดิมที่คุณเคยใช้) -->
            <div id="reader" class="mb-3"></div>

            <div class="input-group">
                <span class="input-group-text bg-primary text-white border-0"><i class="bi bi-upc"></i></span>
                <input type="text" id="barcode-input" class="form-control form-control-lg border-0 bg-light"
                    placeholder="ປ້ອນລະຫັດບາໂຄດ..." autofocus>
                <button class="btn btn-primary" onclick="manualAdd()">ເພີ່ມ</button>
            </div>
            <small class="text-muted mt-2 text-center d-block">ພິມລະຫັດແລ້ວກົດ Enter ຫຼື
                ໃຊ້ເຄື່ອງສະແກນຍິງເຂົ້າຊ່ອງນີ້ໄດ້ເລີຍ</small>
        </div>

        <div class="d-flex justify-content-between px-2 mb-2">
            <span class="fw-bold text-secondary">ລາຍການສິນຄ້າ</span>
            <span class="badge bg-dark" id="item-count">0 ຊິ້ນ</span>
        </div>

        <div id="cart-list"></div>
    </div>

    <div class="footer-total">
        <div class="container">
            <div class="d-flex justify-content-between align-items-end mb-3">
                <span class="text-muted">ລາຄາລວມທັ້ງຫມົດ:</span>
                <div class="text-end">
                    <span class="h1 fw-bold text-primary mb-0" id="grand-total">0</span>
                    <span class="text-primary fw-bold"> ກີບ</span>
                </div>
            </div>
            <button class="btn btn-success w-100 py-3 rounded-3 fw-bold fs-5" onclick="checkout()">
                <i class="bi bi-cart-check"></i> ຢືນຢັນການຂາຍ
            </button>
        </div>
    </div>

    <script>
        // --- 1. FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyC8b0h8yyTo5th6UMrI4_dKUB1ZnvCwZBw",
            authDomain: "fuji-mobile-shop.firebaseapp.com",
            databaseURL: "https://fuji-mobile-shop-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "fuji-mobile-shop",
            storageBucket: "fuji-mobile-shop.appspot.com",
            messagingSenderId: "753053073037",
            appId: "1:753053073037:web:7c9cb46e055b91a4cf2cc4"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let cart = [];
        let allProducts = {};

        db.ref('products').on('value', snap => {
            allProducts = snap.val() || {};
        });

        // --- 2. CAMERA SCANNER (ใช้โค้ดเดิมที่คุณเคยส่งมา) ---
        const html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 25, qrbox: 250 }, (txt) => {
            const product = allProducts[txt];
            if (product) {
                addItem(txt, product);
                html5QrCode.pause();
                setTimeout(() => html5QrCode.resume(), 1500);
            }
        });

        // --- 3. MANUAL INPUT ---
        function manualAdd() {
            const code = document.getElementById('barcode-input').value.trim();
            if (code && allProducts[code]) {
                addItem(code, allProducts[code]);
                document.getElementById('barcode-input').value = "";
                document.getElementById('barcode-input').focus();
            } else if (code) {
                alert("ບໍ່ພົບລະຫັດສິນຄ້ານີ້!");
            }
        }

        document.getElementById('barcode-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') manualAdd();
        });

        // --- 4. ADD ITEM & RENDER (แก้เรื่อง NaN และสกุลเงิน) ---
        function addItem(qr, p) {
            const idx = cart.findIndex(item => item.qr === qr);

            // ล้างคอมม่าและแปลงเป็นตัวเลข
            let rawPrice = (p.price_sale || p.price || "0").toString();
            let cleanPrice = parseFloat(rawPrice.replace(/[^0-9.]/g, '')) || 0;
            let stock = parseInt(p.qty || p.stock || 0);

            if (idx > -1) {
                if (cart[idx].qty < stock) cart[idx].qty++;
                else alert("ສິນຄ້າໃນສະຕັອກບໍ່ພໍ");
            } else {
                if (stock <= 0) {
                    alert("ສິນຄ້າໝົດສະຕັອກ!");
                    return;
                }
                cart.unshift({ qr: qr, name: p.name, price: cleanPrice, qty: 1, stock: stock });
            }
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            let total = 0;
            let count = 0;
            list.innerHTML = "";

            cart.forEach((item, i) => {
                total += item.price * item.qty;
                count += item.qty;
                list.innerHTML += `
                <div class="cart-item d-flex justify-content-between align-items-center">
                    <div>
                        <div class="fw-bold text-dark">${item.name}</div>
                        <div class="small text-muted">ລະຫັດ: ${item.qr}</div>
                        <div class="text-primary fw-bold">${item.price.toLocaleString()}.-</div>
                    </div>
                    <div class="d-flex align-items-center">
                        <div class="btn-group btn-group-sm me-3">
                            <button class="btn btn-light border" onclick="updateQty(${i},-1)">-</button>
                            <span class="btn disabled text-dark border" style="min-width:40px">${item.qty}</span>
                            <button class="btn btn-light border" onclick="updateQty(${i},1)">+</button>
                        </div>
                        <button class="btn btn-link text-danger p-0" onclick="removeItem(${i})"><i class="bi bi-trash fs-5"></i></button>
                    </div>
                </div>`;
            });
            document.getElementById('grand-total').innerText = total.toLocaleString();
            document.getElementById('item-count').innerText = count + " ຊິ້ນ";
        }

        function updateQty(i, n) {
            if (n > 0 && cart[i].qty < cart[i].stock) cart[i].qty++;
            else if (n < 0 && cart[i].qty > 1) cart[i].qty--;
            renderCart();
        }

        function removeItem(i) { cart.splice(i, 1); renderCart(); }
        function clearCart() { cart = []; renderCart(); }

        // --- 5. CHECKOUT ---
        async function checkout() {
            if (cart.length === 0) return;
            if (confirm("ຢືນຢັນການຂາຍ?")) {
                const updates = {};
                const dateKey = new Date().toISOString().split('T')[0];
                cart.forEach(item => {
                    updates[`/products/${item.qr}/qty`] = item.stock - item.qty;
                    const saleRef = db.ref(`sales/${dateKey}`).push();
                    updates[`/sales/${dateKey}/${saleRef.key}`] = {
                        qr: item.qr, name: item.name, price: item.price,
                        qty: item.qty, total: item.price * item.qty,
                        time: new Date().toLocaleTimeString('th-TH')
                    };
                });
                try {
                    await db.ref().update(updates);
                    alert("✅ ຂາຍສຳເລັດ!");
                    clearCart();
                } catch (err) { alert("Error: " + err.message); }
            }
        }
    </script>
</body>

</html>
