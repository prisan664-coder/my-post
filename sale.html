<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuji Ultra POS - จ่ายเงินระบบโปร</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --fuji-green: #2d5a27;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body {
            background: linear-gradient(135deg, #e9f0e8 0%, #d3e0d1 100%);
            font-family: 'Kanit', sans-serif;
            min-height: 100vh;
            padding-bottom: 140px;
        }

        .modern-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        #reader {
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
            border: 4px solid #fff;
        }

        .cart-item {
            background: white;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 10px;
            border: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
        }

        .total-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 20px;
            border-top: 2px solid #fff;
            border-radius: 25px 25px 0 0;
            z-index: 1000;
        }
    </style>
</head>

<body>

    <div class="container py-3">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <a href="dashboard.html" class="btn btn-light rounded-circle shadow-sm"><i
                    class="bi bi-chevron-left"></i></a>
            <h4 class="fw-bold mb-0">คีย์ขาย Fuji Mobile</h4>
            <a href="salehistory.html" class="btn btn-outline-dark btn-sm rounded-pill">ดูประวัติขาย</a>
        </div>

        <div class="modern-card p-2 mb-3 text-center">
            <div id="reader"></div>
            <div class="py-2 small text-muted"><i class="bi bi-lightning-fill text-warning"></i>
                สแกนบาร์โค้ดเพื่อเพิ่มรายการ</div>
        </div>

        <div class="px-2 mb-2 d-flex justify-content-between align-items-center">
            <span class="fw-bold">รายการในตะกร้า</span>
            <button class="btn btn-sm text-danger" onclick="clearCart()">ล้างตะกร้า</button>
        </div>
        <div id="cart-list">
        </div>
    </div>

    <div class="total-panel shadow-lg">
        <div class="container text-center">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <span class="text-muted">ยอดรวมทั้งสิ้น:</span>
                <span class="h1 mb-0 fw-bold text-success" id="grand-total">0</span>
            </div>
            <button class="btn btn-success w-100 py-3 rounded-pill fw-bold fs-5 shadow" onclick="checkout()">
                ยืนยันชำระเงิน <i class="bi bi-check-circle-fill ms-2"></i>
            </button>
        </div>
    </div>

    <script>
        // --- 1. FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyC8b0h8yyTo5th6UMrI4_dKUB1ZnvCwZBw",
            authDomain: "fuji-mobile-shop.firebaseapp.com",
            databaseURL: "https://fuji-mobile-shop-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "fuji-mobile-shop",
            storageBucket: "fuji-mobile-shop.appspot.com",
            messagingSenderId: "753053073037",
            appId: "1:753053073037:web:7c9cb46e055b91a4cf2cc4"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let cart = [];
        let allProducts = {};

        // ดึงข้อมูลสินค้ามา Cache ไว้เพื่อความเร็ว
        db.ref('products').on('value', snap => {
            allProducts = snap.val() || {};
        });

        // --- 2. SCANNER SETUP ---
        const html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (txt) => {
            const product = allProducts[txt];
            if (product) {
                if (product.qty <= 0) return alert("สินค้าหมด!");
                addItem(txt, product);
                if (navigator.vibrate) navigator.vibrate(50);
            }
        });

        // --- 3. CART LOGIC ---
        function addItem(qr, p) {
            const idx = cart.findIndex(i => i.qr === qr);
            if (idx > -1) {
                if (cart[idx].qty < p.qty) cart[idx].qty++;
                else alert("สินค้าในร้านไม่พอ!");
            } else {
                cart.unshift({ qr: qr, name: p.name, price: p.price, qty: 1, stock: p.qty });
            }
            renderCart();
        }

        function renderCart() {
            const div = document.getElementById('cart-list');
            let total = 0;
            div.innerHTML = "";
            cart.forEach((item, i) => {
                total += item.price * item.qty;
                div.innerHTML += `
                <div class="cart-item d-flex justify-content-between align-items-center">
                    <div>
                        <div class="fw-bold">${item.name}</div>
                        <div class="text-success small">${item.price.toLocaleString()} x ${item.qty}</div>
                    </div>
                    <div class="d-flex align-items-center">
                        <button class="btn btn-sm btn-light border" onclick="updateQty(${i},-1)">-</button>
                        <span class="mx-2 fw-bold">${item.qty}</span>
                        <button class="btn btn-sm btn-light border" onclick="updateQty(${i},1)">+</button>
                        <i class="bi bi-trash text-danger ms-3" onclick="removeItem(${i})"></i>
                    </div>
                </div>`;
            });
            document.getElementById('grand-total').innerText = total.toLocaleString();
        }

        function updateQty(i, n) {
            if (n > 0 && cart[i].qty < cart[i].stock) cart[i].qty++;
            else if (n < 0 && cart[i].qty > 1) cart[i].qty--;
            renderCart();
        }

        function removeItem(i) { cart.splice(i, 1); renderCart(); }
        function clearCart() { cart = []; renderCart(); }

        // --- 4. CHECKOUT (ฟังก์ชันจ่ายเงินเวอร์ชันเต็ม) ---
        async function checkout() {
            if (cart.length === 0) return;

            if (confirm(`ยืนยันการขายบิลนี้รวม ${document.getElementById('grand-total').innerText} บาท?`)) {
                const now = new Date();
                const dateKey = now.toISOString().split('T')[0]; // เช่น 2026-04-26 (ใช้สำหรับเป็นหัวข้อใน Firebase)
                const dateFull = now.toLocaleDateString('th-TH'); // วัน/เดือน/ปี แบบไทย
                const timeStr = now.toLocaleTimeString('th-TH'); // เวลา 13:45:00

                const updates = {};

                cart.forEach(item => {
                    // 1. คำสั่งอัปเดตสต็อกสินค้า (หักลบออก)
                    updates[`/products/${item.qr}/qty`] = item.stock - item.qty;

                    // 2. เตรียมข้อมูลบันทึกประวัติการขาย
                    const saleRef = db.ref(`sales/${dateKey}`).push();
                    updates[`/sales/${dateKey}/${saleRef.key}`] = {
                        qr: item.qr,       // เก็บไว้เพื่อใช้คืนสต็อกเวลาลบประวัติ
                        name: item.name,
                        price: item.price,
                        qty: item.qty,
                        total: item.price * item.qty,
                        fullDate: dateFull,
                        time: timeStr      // เก็บเวลาที่ขายจริง
                    };
                });

                try {
                    // อัปเดตสต็อกและบันทึกประวัติพร้อมกันทีเดียว
                    await db.ref().update(updates);
                    alert("✅ ขายสำเร็จ! บันทึกข้อมูลเรียบร้อย");
                    cart = [];
                    renderCart();
                } catch (err) {
                    alert("❌ เกิดข้อผิดพลาด: " + err.message);
                }
            }
        }
    </script>
</body>

</html>
