<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sale - Fuji</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            background: #fff5f5;
            font-family: 'Kanit', sans-serif;
        }

        #reader {
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
        }

        .info-box {
            background: #fff;
            border-left: 5px solid #0d6efd;
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div class="p-3 bg-primary text-white d-flex justify-content-between">
        <span><a href="dashboard.html" class="text-white text-decoration-none">← กลับ</a></span>
        <strong>คีย์ขายสินค้า</strong>
        <span></span>
    </div>

    <div class="container py-3">
        <div id="reader" class="mb-3 shadow-sm"></div>
        <input type="text" id="qr-code" class="form-control mb-3 text-center fs-4" placeholder="รหัสที่สแกนได้"
            readonly>

        <div id="result" class="info-box d-none shadow-sm">
            <h4 id="res-name" class="mb-1"></h4>
            <h3 id="res-price" class="text-danger"></h3>
            <p id="res-stock" class="mb-0 text-muted"></p>
            <button class="btn btn-primary btn-lg w-100 mt-3" onclick="sell()">ยืนยันขาย (ลดสต็อก)</button>
        </div>
    </div>

    <script>
        // ใช้ Firebase Config เดียวกัน
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (txt) => {
            document.getElementById('qr-code').value = txt;
            db.ref('products/' + txt).once('value', s => {
                const d = s.val();
                if (d) {
                    document.getElementById('result').classList.remove('d-none');
                    document.getElementById('res-name').innerText = d.name;
                    document.getElementById('res-price').innerText = d.price + " บาท";
                    document.getElementById('res-stock').innerText = "คงเหลือในร้าน: " + d.qty + " ชิ้น";
                } else { alert("ไม่มีสินค้านี้ในสต็อก!"); }
            });
        });

        function sell() {
            const qr = document.getElementById('qr-code').value;
            db.ref('products/' + qr).once('value').then(s => {
                const d = s.val();
                if (d && d.qty > 0) {
                    db.ref('products/' + qr + '/qty').set(d.qty - 1);
                    const date = new Date().toISOString().split('T')[0];
                    db.ref('sales/' + date).push({ name: d.name, price: d.price, time: new Date().toLocaleTimeString() });
                    alert("บันทึกการขายเรียบร้อย!"); location.reload();
                }
            });
        }
    </script>
</body>

</html>
