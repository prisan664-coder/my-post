<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sale History - Fuji Mobile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body {
            background: #f0f2f5;
            font-family: 'Kanit', sans-serif;
        }

        .history-card {
            border: none;
            border-radius: 15px;
            transition: 0.3s;
            margin-bottom: 10px;
            border-left: 5px solid #dc3545;
        }

        .date-badge {
            background: #e9ecef;
            color: #495057;
            border-radius: 8px;
            padding: 5px 12px;
            font-size: 0.85rem;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html"><i class="bi bi-arrow-left"></i> ประวัติการขาย</a>
            <input type="date" id="filter-date" class="form-control form-control-sm w-auto"
                onchange="loadHistory(this.value)">
        </div>
    </nav>

    <div class="container py-4">
        <div id="history-container">
            <div class="text-center p-5 text-muted">เลือกวันที่เพื่อดูรายการขาย...</div>
        </div>
    </div>

    <script>
        // --- Config ---
        const firebaseConfig = { /* ใส่ Config ของคุณ */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const ADMIN_PASS = "Zxc12345_";

        // ตั้งค่าวันที่ปัจจุบันเป็นค่าเริ่มต้น
        document.getElementById('filter-date').value = new Date().toISOString().split('T')[0];

        function loadHistory(date) {
            if (!date) return;
            db.ref('sales/' + date).on('value', (snapshot) => {
                const container = document.getElementById('history-container');
                container.innerHTML = "";

                if (!snapshot.exists()) {
                    container.innerHTML = '<div class="text-center mt-5">ไม่มียอดขายในวันที่เลือก</div>';
                    return;
                }

                snapshot.forEach((child) => {
                    const sale = child.val();
                    const saleId = child.key;
                    container.innerHTML += `
                    <div class="card history-card shadow-sm p-3">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <span class="date-badge mb-2 d-inline-block">${sale.time}</span>
                                <h6 class="fw-bold mb-1">${sale.name}</h6>
                                <p class="small text-muted mb-0">จำนวน: ${sale.qty} | ราคารวม: <span class="text-danger fw-bold">${sale.total.toLocaleString()}.-</span></p>
                            </div>
                            <div class="btn-group">
                                <button class="btn btn-outline-warning btn-sm" onclick="editSale('${date}', '${saleId}')"><i class="bi bi-pencil"></i></button>
                                <button class="btn btn-outline-danger btn-sm" onclick="deleteSale('${date}', '${saleId}')"><i class="bi bi-trash"></i></button>
                            </div>
                        </div>
                    </div>`;
                });
            });
        }

        // --- ระบบลบรายการ (พร้อมคืนสต็อก) ---
        async function deleteSale(date, saleId) {
            const pass = prompt("🔐 กรุณาป้อนรหัสผ่านเพื่อลบรายการขาย:");
            if (pass !== ADMIN_PASS) return alert("รหัสผ่านไม่ถูกต้อง!");

            if (confirm("การลบรายการนี้จะทำให้สต็อกสินค้าถูกดึงกลับเข้าคลัง ยืนยันหรือไม่?")) {
                const saleRef = db.ref(`sales/${date}/${saleId}`);
                const snapshot = await saleRef.once('value');
                const saleData = snapshot.val();

                if (saleData && saleData.qr) {
                    // 1. คืนค่าสต็อก
                    const prodRef = db.ref(`products/${saleData.qr}/qty`);
                    const prodSnap = await prodRef.once('value');
                    const currentQty = prodSnap.val() || 0;
                    await prodRef.set(currentQty + saleData.qty);

                    // 2. ลบประวัติขาย
                    await saleRef.remove();
                    alert("🗑️ ลบรายการและคืนสต็อกเรียบร้อยแล้ว");
                }
            }
        }

        // --- ระบบแก้ไข (เฉพาะยอดเงิน/จำนวน) ---
        async function editSale(date, saleId) {
            const pass = prompt("🔐 กรุณาป้อนรหัสผ่านเพื่อแก้ไข:");
            if (pass !== ADMIN_PASS) return alert("รหัสผ่านไม่ถูกต้อง!");

            const saleRef = db.ref(`sales/${date}/${saleId}`);
            const snapshot = await saleRef.once('value');
            const saleData = snapshot.val();

            const newQty = prompt("แก้ไขจำนวนที่ขาย:", saleData.qty);
            if (newQty === null) return;

            // คำนวณความต่างสต็อก
            const diff = parseInt(newQty) - saleData.qty;

            // อัปเดตข้อมูล
            await saleRef.update({
                qty: parseInt(newQty),
                total: saleData.price * parseInt(newQty)
            });

            // อัปเดตสต็อกในฐานข้อมูล
            const prodRef = db.ref(`products/${saleData.qr}/qty`);
            const prodSnap = await prodRef.once('value');
            await prodRef.set(prodSnap.val() - diff);

            alert("✅ อัปเดตข้อมูลและสต็อกเรียบร้อย");
        }

        // โหลดครั้งแรก
        loadHistory(document.getElementById('filter-date').value);
    </script>
</body>

</html>
