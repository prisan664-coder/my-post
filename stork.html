<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuji Mobile - Stock List (Secure)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(rgba(255, 255, 255, 0.85), rgba(255, 255, 255, 0.85)), url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1500');
            background-size: cover;
            background-attachment: fixed;
            font-family: 'Kanit', sans-serif;
        }

        .glass-header {
            background: #2d5a27;
            color: white;
            border-radius: 0 0 20px 20px;
            padding: 20px;
        }

        .product-card {
            background: white;
            border-radius: 15px;
            border: none;
            transition: 0.3s;
            margin-bottom: 12px;
            border-left: 5px solid #2d5a27;
        }

        .scan-btn-float {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            z-index: 1000;
        }

        #reader {
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            display: none;
            margin-bottom: 15px;
            border: 2px solid #2d5a27;
        }

        .badge-qty {
            font-size: 0.9rem;
            padding: 5px 10px;
        }
    </style>
</head>

<body>

    <div class="glass-header shadow mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="dashboard.html" class="text-white text-decoration-none"><i class="bi bi-arrow-left-circle"></i>
                กลับ</a>
            <h4 class="mb-0">สต็อกสินค้า (ระบบป้องกัน)</h4>
            <span></span>
        </div>
    </div>

    <div class="container pb-5">
        <div class="card p-3 border-0 shadow-sm mb-4 rounded-4">
            <div id="reader"></div>
            <div class="input-group">
                <input type="text" id="searchInput" class="form-control border-end-0"
                    placeholder="พิมพ์ชื่อสินค้าหรือสแกน..." onkeyup="filterItems()">
                <button class="btn btn-outline-success border-start-0" onclick="toggleScanner()"><i
                        class="bi bi-upc-scan"></i> สแกน</button>
            </div>
        </div>

        <div id="stock-list">
            <div class="text-center p-5 text-muted">กำลังโหลดข้อมูลสินค้า...</div>
        </div>
    </div>

    <button class="btn btn-success scan-btn-float shadow-lg" onclick="toggleScanner()"><i
            class="bi bi-camera"></i></button>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <script>
        // --- 1. CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyC8b0h8yyTo5th6UMrI4_dKUB1ZnvCwZBw",
            authDomain: "fuji-mobile-shop.firebaseapp.com",
            databaseURL: "https://fuji-mobile-shop-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "fuji-mobile-shop",
            storageBucket: "fuji-mobile-shop.appspot.com",
            messagingSenderId: "753053073037",
            appId: "1:753053073037:web:7c9cb46e055b91a4cf2cc4"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const ADMIN_PASS = "Zxc12345_"; // รหัสผ่านยืนยัน
        let scanner;

        // --- 2. LOAD DATA ---
        function loadStock() {
            db.ref('products').on('value', (snapshot) => {
                const listArea = document.getElementById('stock-list');
                listArea.innerHTML = "";
                if (!snapshot.exists()) { listArea.innerHTML = '<div class="text-center mt-5">ไม่มีสินค้า</div>'; return; }

                snapshot.forEach((child) => {
                    const item = child.val();
                    const key = child.key;
                    listArea.innerHTML += `
                    <div class="card product-card p-3 shadow-sm item-row" data-code="${key}" data-name="${item.name}">
                        <div class="d-flex justify-content-between">
                            <div>
                                <h5 class="mb-1 fw-bold">${item.name}</h5>
                                <p class="text-muted small mb-1">รหัส: ${key}</p>
                                <div class="text-danger h5 mb-0">${item.price} ກີບ</div>
                            </div>
                            <div class="text-end">
                                <span class="badge ${item.qty > 0 ? 'bg-success' : 'bg-secondary'} badge-qty">คงเหลือ: ${item.qty}</span>
                                <div class="mt-3">
                                    <button class="btn btn-sm btn-warning me-1" onclick="secureEdit('${key}', '${item.name}', ${item.price}, ${item.qty})"><i class="bi bi-pencil"></i></button>
                                    <button class="btn btn-sm btn-danger" onclick="secureDelete('${key}', '${item.name}')"><i class="bi bi-trash"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>`;
                });
            });
        }

        // --- 3. SECURITY LOGIC ---
        function secureEdit(key, name, price, qty) {
            const pass = prompt("🔐 กรุณาใส่รหัสผ่านเพื่อแก้ไข:");
            if (pass === null) return; // กดยกเลิก

            if (pass === ADMIN_PASS) {
                const newName = prompt("แก้ไขชื่อสินค้า:", name);
                const newPrice = prompt("แก้ไขราคาขาย:", price);
                const newQty = prompt("แก้ไขจำนวนคงเหลือ:", qty);

                if (newName && newPrice && newQty) {
                    db.ref('products/' + key).update({
                        name: newName, price: newPrice, qty: parseInt(newQty)
                    }).then(() => alert("✅ แก้ไขข้อมูลเรียบร้อย"));
                }
            } else {
                alert("❌ รหัสผ่านไม่ถูกต้อง! ไม่สามารถแก้ไขได้");
            }
        }

        function secureDelete(key, name) {
            const pass = prompt(`⚠️ ยืนยันการลบ "${name}"\nกรุณาใส่รหัสผ่านเพื่อลบ:`);
            if (pass === null) return;

            if (pass === ADMIN_PASS) {
                if (confirm("คุณแน่ใจจริงๆ ใช่ไหมว่าจะลบข้อมูลนี้ถาวร?")) {
                    db.ref('products/' + key).remove().then(() => alert("🗑️ ลบข้อมูลสำเร็จ"));
                }
            } else {
                alert("❌ รหัสผ่านไม่ถูกต้อง! ไม่สามารถลบได้");
            }
        }

        // --- 4. SEARCH & SCAN ---
        function filterItems() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.item-row').forEach(row => {
                const text = row.getAttribute('data-name').toLowerCase() + row.getAttribute('data-code').toLowerCase();
                row.style.display = text.includes(val) ? "block" : "none";
            });
        }

        function toggleScanner() {
            const readerDiv = document.getElementById('reader');
            if (readerDiv.style.display === "block") {
                scanner.stop(); readerDiv.style.display = "none";
            } else {
                readerDiv.style.display = "block";
                scanner = new Html5Qrcode("reader");
                scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
                    document.getElementById('searchInput').value = txt;
                    filterItems(); scanner.stop(); readerDiv.style.display = "none";
                });
            }
        }

        window.onload = loadStock;
    </script>
</body>

</html>
