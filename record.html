<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record - Fuji</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            background: #eef2f3;
            font-family: 'Kanit', sans-serif;
        }

        #reader {
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
        }
    </style>
</head>

<body>
    <div class="p-3 bg-success text-white d-flex justify-content-between">
        <span><a href="dashboard.html" class="text-white text-decoration-none">← กลับ</a></span>
        <strong>บันทึกสต็อกเข้า</strong>
        <span></span>
    </div>

    <div class="container py-3">
        <div class="card p-3 border-0 shadow-sm mb-3">
            <div id="reader"></div>
            <p class="text-center text-muted small mt-2">สแกนบาร์โค้ดหรือคิวอาร์ที่ตัวสินค้า</p>
        </div>

        <div class="card p-3 border-0 shadow-sm">
            <label class="small text-muted">รหัสสินค้า (จากการสแกน)</label>
            <input type="text" id="qr" class="form-control mb-2 bg-light" readonly>
            <input type="text" id="name" class="form-control mb-2" placeholder="ชื่อสินค้า/สมาชิก">
            <input type="number" id="price" class="form-control mb-2" placeholder="ราคาขาย">
            <input type="number" id="qty" class="form-control mb-3" placeholder="จำนวนที่เพิ่ม">
            <button class="btn btn-success btn-lg w-100" onclick="save()">บันทึกเข้าระบบ</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC8b0h8yyTo5th6UMrI4_dKUB1ZnvCwZBw",
            authDomain: "fuji-mobile-shop.firebaseapp.com",
            databaseURL: "https://fuji-mobile-shop-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "fuji-mobile-shop",
            storageBucket: "fuji-mobile-shop.appspot.com",
            messagingSenderId: "753053073037",
            appId: "1:753053073037:web:7c9cb46e055b91a4cf2cc4"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 15, qrbox: { width: 250, height: 150 } }, (txt) => {
            document.getElementById('qr').value = txt;
            // ลองหาว่าเคยมีในสต็อกไหม
            db.ref('products/' + txt).once('value', s => {
                if (s.val()) {
                    document.getElementById('name').value = s.val().name;
                    document.getElementById('price').value = s.val().price;
                }
            });
        });

        function save() {
            const qr = document.getElementById('qr').value;
            const name = document.getElementById('name').value;
            const price = document.getElementById('price').value;
            const qty = parseInt(document.getElementById('qty').value);
            if (!qr || !name || !qty) return alert("ข้อมูลไม่ครบ!");

            db.ref('products/' + qr).once('value').then(s => {
                const oldQty = s.val() ? parseInt(s.val().qty) : 0;
                db.ref('products/' + qr).set({ name, price, qty: oldQty + qty })
                    .then(() => { alert("ลงสต็อกแล้ว!"); location.reload(); });
            });
        }
    </script>
</body>

</html>
