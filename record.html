<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record - Fuji</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background: #eef2f3; font-family: 'Kanit', sans-serif; }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; background: #000; border: 2px solid #198754; }
        .form-control:focus { border-color: #198754; box-shadow: 0 0 0 0.25rem rgba(25, 135, 84, 0.25); }
    </style>
</head>

<body>
    <div class="p-3 bg-success text-white d-flex justify-content-between align-items-center shadow-sm">
        <a href="dashboard.html" class="text-white text-decoration-none">← กลับ</a>
        <strong class="fs-5">ບັນທຶກສິນຄ້າເຂົ້າສະຕອກ</strong>
        <div style="width: 40px;"></div>
    </div>

    <div class="container py-3">
        <div class="card p-2 border-0 shadow-sm mb-3">
            <div id="reader"></div>
            <p class="text-center text-muted small mt-2 mb-1">ສະເກນຫຼືບັນທຶກລະຫັດບາໂຄດ</p>
        </div>

        <div class="card p-3 border-0 shadow-sm">
            <div class="mb-3">
                <label class="small text-success fw-bold">ລະຫັດບາໂຄດ / ລະຫັດສິນຄ້າ</label>
                <div class="input-group">
                    <span class="input-group-text bg-white"><i class="bi bi-upc-scan"></i></span>
                    <input type="text" id="qr" class="form-control form-control-lg" placeholder="รหัสบาร์โค้ด" oninput="autoSearch(this.value)">
                </div>
            </div>

            <div class="mb-3">
                <label class="small text-muted">ຊື່ສິນຄ້າ / ລຸ້ນ</label>
                <input type="text" id="name" class="form-control" placeholder="ชื่อสินค้าจะขึ้นที่นี่">
            </div>

            <div class="row g-2 mb-3">
                <div class="col-6">
                    <label class="small text-muted text-primary fw-bold">ລາຄາຂາຍ (เงิน)</label>
                    <input type="text" id="price" class="form-control" inputmode="decimal" placeholder="0" oninput="formatDisplay(this)">
                </div>
                <div class="col-6">
                    <label class="small text-muted">ຈຳນວນທີເພິ່ມ</label>
                    <input type="number" id="qty" class="form-control" placeholder="1">
                </div>
            </div>

            <button class="btn btn-success btn-lg w-100 shadow-sm" onclick="save()">
                <i class="bi bi-save"></i> ບັນທຶກເຂົ້າລະບົບ
            </button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC8b0h8yyTo5th6UMrI4_dKUB1ZnvCwZBw",
            authDomain: "fuji-mobile-shop.firebaseapp.com",
            databaseURL: "https://fuji-mobile-shop-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "fuji-mobile-shop",
            storageBucket: "fuji-mobile-shop.appspot.com",
            messagingSenderId: "753053073037",
            appId: "1:753053073037:web:7c9cb46e055b91a4cf2cc4"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function formatDisplay(input) {
            let cursorPosition = input.selectionStart;
            let oldLength = input.value.length;
            let val = input.value.replace(/[^\d]/g, "");
            if (val === "") { input.value = ""; return; }
            input.value = val.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
            let newLength = input.value.length;
            input.setSelectionRange(cursorPosition + (newLength - oldLength), cursorPosition + (newLength - oldLength));
        }

        function numberWithCommas(x) {
            if (!x) return "";
            let val = x.toString().replace(/[^\d]/g, "");
            return val.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        const scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 30, qrbox: { width: 280, height: 180 }, aspectRatio: 1.0, disableFlip: true }, (txt) => {
            
            // --- เริ่มต้นส่วนการแยกข้อมูล (Splitting Logic) ---
            // สมมติว่าบาร์โค้ดมีรูปแบบคือ "ชื่อสินค้า,รหัส" หรือ "ชื่อสินค้า-รหัส"
            let finalCode = txt;
            
            if (txt.includes(",")) {
                let parts = txt.split(","); 
                document.getElementById('name').value = parts[0].trim(); // ใส่ชื่อในช่องชื่อ
                finalCode = parts[1].trim(); // เอารหัสไปใช้ค้นหาต่อ
            } else if (txt.includes("-")) {
                let parts = txt.split("-");
                document.getElementById('name').value = parts[0].trim();
                finalCode = parts[1].trim();
            }
            
            document.getElementById('qr').value = finalCode; // ใส่รหัสในช่อง QR
            autoSearch(finalCode); // สั่งค้นหาข้อมูลอื่น (เช่น ราคา) ต่อทันที
            // --- จบบริบูรณ์ ---
            
        });

        function autoSearch(txt) {
            if (txt.length < 3) return;
            db.ref('products/' + txt).once('value', s => {
                const data = s.val();
                if (data) {
                    // ถ้าใน Database มีชื่ออยู่แล้ว ให้ใช้ชื่อจาก DB (ป้องกันชื่อซ้ำซ้อน)
                    if (data.name) document.getElementById('name').value = data.name;
                    let oldPrice = data.price || "";
                    document.getElementById('price').value = numberWithCommas(oldPrice);
                    document.getElementById('qty').focus();
                }
            });
        }

        function save() {
            const qr = document.getElementById('qr').value;
            const name = document.getElementById('name').value;
            const price = document.getElementById('price').value.replace(/,/g, "");
            const qty = parseInt(document.getElementById('qty').value || 0);

            if (!qr || !name || qty <= 0) return alert("กรุณากรอกข้อมูลให้ครบถ้วน");

            db.ref('products/' + qr).once('value').then(s => {
                const oldQty = s.val() ? parseInt(s.val().qty || 0) : 0;
                db.ref('products/' + qr).update({
                    name: name,
                    price: price,
                    qty: oldQty + qty,
                    lastUpdate: new Date().toLocaleString()
                }).then(() => {
                    alert("✅ ບັນທຶກສຳເລັດ!");
                    ["qr", "name", "price", "qty"].forEach(id => document.getElementById(id).value = "");
                    document.getElementById('qr').focus();
                });
            });
        }
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</body>
</html>
