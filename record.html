<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record - Fuji</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            background: #eef2f3;
            font-family: 'Kanit', sans-serif;
        }

        #reader {
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
            border: 2px solid #198754;
        }

        .form-control:focus {
            border-color: #198754;
            box-shadow: 0 0 0 0.25 row rgba(25, 135, 84, 0.25);
        }
    </style>
</head>

<body>
    <div class="p-3 bg-success text-white d-flex justify-content-between align-items-center shadow-sm">
        <a href="dashboard.html" class="text-white text-decoration-none">← กลับ</a>
        <strong class="fs-5">ບັນທຶກສິນຄ້າເຂົ້າສະຕອກ</strong>
        <div style="width: 40px;"></div>
    </div>

    <div class="container py-3">
        <div class="card p-2 border-0 shadow-sm mb-3">
            <div id="reader"></div>
            <p class="text-center text-muted small mt-2 mb-1">ສະເກນຫຼືບັນທຶກລະຫັດບາໂຄດ</p>
        </div>

        <div class="card p-3 border-0 shadow-sm">
            <div class="mb-3">
                <label class="small text-success fw-bold">ລະຫັດບາໂຄດ / ລະຫັດສິນຄ້າ</label>
                <div class="input-group">
                    <span class="input-group-text bg-white"><i class="bi bi-upc-scan"></i></span>
                    <input type="text" id="qr" class="form-control form-control-lg"
                        placeholder="สแกนหรือพิมพ์รหัสที่นี่..." oninput="autoSearch(this.value)">
                </div>
            </div>

            <div class="mb-3">
                <label class="small text-muted">ຊື່ສິນຄ້າ / ລຸ້ນ</label>
                <input type="text" id="name" class="form-control" placeholder="ระบุชื่อสินค้า">
            </div>

            <div class="row g-2 mb-3">
                <div class="col-6">
                    <label class="small text-muted">ລາຄາຂາຍ</label>
                    <input type="number" id="price" class="form-control" placeholder="0.00">
                </div>
                <div class="col-6">
                    <label class="small text-muted">ຈຳນວນທີເພິ່ມ</label>
                    <input type="number" id="qty" class="form-control" placeholder="1">
                </div>
            </div>

            <button class="btn btn-success btn-lg w-100 shadow-sm" onclick="save()">
                <i class="bi bi-save"></i> ບັນທຶກເຂົ້າລະບົບ
            </button>
        </div>
    </div>

    <script>
        // --- Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyC8b0h8yyTo5th6UMrI4_dKUB1ZnvCwZBw",
            authDomain: "fuji-mobile-shop.firebaseapp.com",
            databaseURL: "https://fuji-mobile-shop-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "fuji-mobile-shop",
            storageBucket: "fuji-mobile-shop.appspot.com",
            messagingSenderId: "753053073037",
            appId: "1:753053073037:web:7c9cb46e055b91a4cf2cc4"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- ตั้งค่า Scanner ให้เร็วขึ้น ---
        const scanner = new Html5Qrcode("reader");
        const config = {
            fps: 30, // เพิ่มความเร็วจาก 15 เป็น 30
            qrbox: { width: 280, height: 180 },
            aspectRatio: 1.0,
            disableFlip: true // ไม่ต้องกลับภาพ ช่วยให้ประมวลผลเร็วขึ้น
        };

        scanner.start({ facingMode: "environment" }, config, (txt) => {
            document.getElementById('qr').value = txt;
            autoSearch(txt); // ค้นหาข้อมูลทันทีที่สแกนติด
            // สั่นเตือนเบาๆ เมื่อสแกนติด (ถ้ามือถือรองรับ)
            if (navigator.vibrate) navigator.vibrate(100);
        });

        // --- ระบบค้นหาข้อมูลอัตโนมัติ (พิมพ์ไปค้นไป) ---
        function autoSearch(txt) {
            if (txt.length < 3) return; // พิมพ์อย่างน้อย 3 ตัวค่อยหา เพื่อประหยัดเน็ต

            db.ref('products/' + txt).once('value', s => {
                const data = s.val();
                if (data) {
                    document.getElementById('name').value = data.name || "";
                    document.getElementById('price').value = data.price || "";
                    // ไฮไลท์ช่องจำนวนให้พร้อมพิมพ์ต่อ
                    document.getElementById('qty').focus();
                }
            });
        }

        // --- บันทึกข้อมูล ---
        function save() {
            const qr = document.getElementById('qr').value;
            const name = document.getElementById('name').value;
            const price = document.getElementById('price').value;
            const qtyInput = document.getElementById('qty').value;
            const qty = parseInt(qtyInput || 0);

            if (!qr || !name || qty <= 0) {
                alert("กรุณากรอกรหัสสินค้า ชื่อ และจำนวนให้ถูกต้อง");
                return;
            }

            db.ref('products/' + qr).once('value').then(s => {
                const oldData = s.val();
                const oldQty = oldData ? parseInt(oldData.qty || 0) : 0;

                db.ref('products/' + qr).set({
                    name: name,
                    price: price,
                    qty: oldQty + qty,
                    lastUpdate: new Date().toLocaleString()
                })
                    .then(() => {
                        alert("✅ บันทึกสต็อกสินค้าเรียบร้อย!");
                        // ล้างข้อมูลเพื่อรอรายการถัดไป
                        document.getElementById('qr').value = "";
                        document.getElementById('name').value = "";
                        document.getElementById('price').value = "";
                        document.getElementById('qty').value = "";
                        document.getElementById('qr').focus();
                    });
            });
        }
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</body>

</html>
